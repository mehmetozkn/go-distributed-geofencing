services:
  # ──────────────────────────────────────────────
  # PostgreSQL + PostGIS
  # ──────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: geofencing-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: geofencing
      POSTGRES_PASSWORD: geofencing_secret
      POSTGRES_DB: geofencing_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geofencing -d geofencing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Apache Kafka (KRaft mode, no Zookeeper)
  # ──────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: geofencing-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      CLUSTER_ID: "geofencing-kafka-cluster-001"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis (caching & rate-limiting)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: geofencing-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────
  # Go Application
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geofencing-app
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://geofencing:geofencing_secret@postgres:5432/geofencing_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP: geofencing-consumer-group
      HTTP_ADDR: ":8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  kafka_data:
  redis_data:
