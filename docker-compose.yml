services:
  # ──────────────────────────────────────────────
  # Go Application
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geofencing-app
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: password123
      DB_NAME: geofencing_db

  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: geofencing-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: geofencing_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geofencing_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ──────────────────────────────────────────────
  # pgAdmin
  # ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: geofencing-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
